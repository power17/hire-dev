server:
  port: ${port:4001}
  tomcat:
    uri-encoding: UTF-8
    max-swallow-size: -1    # tomcat默认大小2M，超过2M的文件不会被捕获，需要调整此处大小为100MB或者-1即可
spring:
  profiles:
    active: dev
  application:
    name: resource-service
  banner:
      location: classpath:banner/banner.txt
mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  global-config:
    db-config:
      id-type: assign_id # 雪花算法