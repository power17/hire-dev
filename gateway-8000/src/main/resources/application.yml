server:
  port: ${port:8000}
  tomcat:
    uri-encoding: UTF-8
    max-swallow-size: -1    # tomcat默认大小2M，超过2M的文件不会被捕获，需要调整此处大小为100MB或者-1即可
spring:
  profiles:
    active: dev
  application:
    name: gateway

blackIP:
  continueCounts: ${counts:3}    # ip连续请求的次数
  timeInterval: ${interval:20}    # ip判断的时间间隔，单位：秒
  limitTimes: ${times:30}         # 限制的时间，单位：秒