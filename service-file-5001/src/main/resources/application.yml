server:
  port: ${port:5001}
  tomcat:
    uri-encoding: UTF-8
#    max-swallow-size: -1    # tomcat默认大小2M，超过2M的文件不会被捕获，需要调整此处大小为100MB或者-1即可
spring:
  profiles:
    active: dev
  banner:
        location: classpath:banner/banner.txt
  application:
    name: file-service
  servlet:
    multipart:
      max-file-size: 200KB
      max-request-size: 200KB
